<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>glitch</title>
  <meta http-equiv="refresh" content="0; url=site/">
  <link rel="canonical" href="site/">
  <script>
    const path = window.location.pathname.endsWith("/")
      ? window.location.pathname
      : `${window.location.pathname}/`;
    window.location.replace(`${window.location.origin}${path}site/${window.location.search}${window.location.hash}`);
  </script>
</head>
<body>
  <p>Redirecting to <a href="site/">the glitch site</a>…</p>
</body>
</html>
